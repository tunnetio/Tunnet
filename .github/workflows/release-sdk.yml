name: Release SDK

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.4.0)"
        required: true
        type: string
      dry-run:
        description: "Build everything but skip publish"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-sdk-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  RUST_TOOLCHAIN: "1.96"
  CARGO_TERM_COLOR: always
  APP_NAME: tuntun-node
  MACOSX_DEPLOYMENT_TARGET: "10.13"

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      dry-run: ${{ steps.meta.outputs.dry-run }}
    steps:
      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry-run }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Extract & validate version
        id: meta
        shell: bash
        run: |
          tag="${{ steps.resolve.outputs.tag }}"
          tag="${tag#v}"
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::Tag v${tag} does not match Cargo.toml version ${cargo_version}"
            exit 1
          fi

          echo "tag=v${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag}" >> "$GITHUB_OUTPUT"
          echo "dry-run=${{ steps.resolve.outputs.dry_run }}" >> "$GITHUB_OUTPUT"

          if echo "$tag" | grep -qE '(alpha|beta|rc|dev|pre)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-sdk:
    name: SDK - ${{ matrix.target }}
    needs: [validate]
    runs-on: ${{ matrix.host }}
    defaults:
      run:
        working-directory: crates/tuntun-node-napi
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: bun run build -- --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: bun run build -- --target aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bun run build -- --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: bun run build -- --target aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: bun run build -- --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: bun run build -- --target aarch64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: bun run build -- --target x86_64-unknown-linux-musl -x
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: bun run build -- --target aarch64-unknown-linux-musl -x
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: sdk-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: sdk-${{ matrix.target }}-

      - uses: mlugg/setup-zig@v2
        if: contains(matrix.target, 'musl')
        with:
          version: 0.14.1

      - uses: taiki-e/install-action@v2
        if: contains(matrix.target, 'musl')
        with:
          tool: cargo-zigbuild

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Build
        run: ${{ matrix.build }}
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: sdk-${{ matrix.target }}
          path: crates/tuntun-node-napi/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  publish-sdk:
    name: Publish SDK (npm)
    needs: [validate, build-sdk]
    if: needs.validate.outputs.dry-run != 'true'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: crates/tuntun-node-napi
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Create npm dirs
        run: bun run create-npm-dirs

      - uses: actions/download-artifact@v8
        with:
          pattern: sdk-*
          path: crates/tuntun-node-napi/artifacts
          merge-multiple: true

      - name: Move artifacts
        run: bun run artifacts

      - name: List packages
        run: ls -R ./npm

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ "${{ needs.validate.outputs.prerelease }}" = "true" ]; then
            npm publish --tag next --access public --provenance
          else
            npm publish --access public --provenance
          fi
