pre-commit:
  parallel: true
  jobs:
    - name: biome-check
      glob: "*.{js,ts,jsx,tsx,json,jsonc,css,mjs,cjs}"
      stage_fixed: true
      run: bun run check --write --no-errors-on-unmatched -- {staged_files}

    - name: rust-fmt
      glob: "**/*.rs"
      stage_fixed: true
      run: cargo fmt

    - name: rust-clippy
      glob: "**/*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings

# pre-push OSS guard lives in .githooks/pre-push (always on; ignores LEFTHOOK=0).
